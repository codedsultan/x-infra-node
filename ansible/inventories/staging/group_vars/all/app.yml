---
# -----------------------------------------------------------------------
# App definition — edit this file to configure your Node.js application.
# -----------------------------------------------------------------------
app:
  # Container image from GHCR (tag is injected at deploy time as $TAG)
  image: "ghcr.io/codedsultan/x-socials:${TAG}"

  # Registry profile key (matches vault_registries in foundation.yml)
  registry_profile: "ghcr"

  # Public domains for each environment
  domains:
    staging: ["staging-api.x-social.xurl.fyi"]
    production: ["api.x-social.xurl.fyi"]

  # Which service Caddy routes to, and on what port
  public_service: app
  public_service_port: 5000

  # Optional health check path (used to verify Caddy routing after deploy)
  # caddy_verify_path: "/health"

  # -----------------------------------------------------------------------
  # Database (remove the entire `db` block if your app has no database)
  # -----------------------------------------------------------------------
  db:
    engine: postgres          # postgres | mariadb
    name: helloapp
    user: helloapp
    host: "cluster-{{ deploy_env }}-shared-postgres"
    port: 5432
    inject: pg_vars      # database_url | pg_vars | db_vars
    password_var: "vault_db_myapp_password"
    # params:
    #     sslmode: disable
    # # List services that should receive DB env vars
    # inject_to_services: ["web", "worker"]

  # -----------------------------------------------------------------------
  # Environment variables
  # -----------------------------------------------------------------------
  env:
    # Static values — safe to commit
    base:
      PORT: "5000"
      NODE_ENV: "staging"
      # LOG_LEVEL: "info"
      SERVER_MAINTENANCE: 'false'
      ENABLE_SWAGGER: "true"
      API_BASE_URL: "https://staging-api.x-social.xurl.fyi"
      MODERATOR_URL:    "https://staging-moderator.x-social.xurl.fyi"
      # docker exec 0f02814e3855 printenv | grep MODERATOR_URL
      MODERATOR_WEBHOOK_ENABLED: true
      MODERATOR_WEBHOOK_TIMEOUT_MS: 5000 #200
      # Add more static env vars here
      AUTO_MIGRATE: "false" 
      # Database mode configuration
      DB_MODE: "split"
      DEFAULT_DB: "mongodb"
      SQL_DB: "postgres"
      PG_SSL: "false"
      PG_CLIENT: "pg"                         # pg | pg-native
      PG_CONNECTION_NAME: "postgres"
      PG_POOL_MIN: 2
      PG_POOL_MAX: 10
      API_PREFIX: "api"

      # CORS_ENABLED: "false

      PROMETHEUS_METRICS_PORT: 9464
      PROMETHEUS_METRICS_ENDPOINT: "/metrics"

      # Enable detailed tracing (default: false in development)
      OTEL_ENABLE_TRACES: "true"

      SMTP_HOST: "smtp-relay.brevo.com"
      SMTP_PORT: "587"
      # SMTP_FROM: "no-reply@xurl.fyi"
      SMTP_FROM: "no-reply@infinibriumglobal.com"
      SMTP_FROM_NAME: "X Socials"

      EMAIL_QUEUE: "true"


    # Derived values (Jinja2 expressions resolved at deploy time)
    derived:
      REDIS_HOST: "cluster-{{ deploy_env }}-shared-redis"
      REDIS_PORT: "6379"
      # DATABASE_URL is injected automatically from db.inject above

    # Keys from vault (never commit actual values — set them in vault.yml)
    secret_map:
      JWT_SECRET: "vault_myapp_jwt_secret"
      REDIS_PASSWORD: "vault_redis_password"
      # Add more secrets here
      MONGO_URI: "vault_mongo_uri"
      MONGO_DB_NAME: "vault_mongo_db_name"
      ADMIN_API_KEY: "vault_xsocials_api_hmac_secret"
      SMTP_USER: "vault_smtp_user"
      SMTP_KEY:  "vault_smtp_key"

    # Optional secrets — app starts fine without them
    secret_map_optional: {}
      # MAIL_PASSWORD: "vault_myapp_mail_password"

    # Keys that must be non-empty at deploy time (deployment fails otherwise)
    required_keys:
      - PORT
      - NODE_ENV
      # - DATABASE_URL
      - JWT_SECRET
      - DEFAULT_DB

  # -----------------------------------------------------------------------
  # Runtime services
  # -----------------------------------------------------------------------
  runtime:
    services:
      app:
        expose: ["5000"]
        env_file: ".env"
        healthcheck:
          test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
          interval: "15s"
          timeout: "5s"
          retries: 5
          start_period: "20s"

      # Optional background worker — remove if not needed
      # worker:
      #   command: ["node", "worker.js"]
      #   env_file: ".env"
      #   depends_on: ["app"]

      worker:
        command: ["node", "dist/workers/emailWorker.js"]
        env_file: ".env"
        depends_on: ["app"]
        healthcheck:
          test: ["CMD-SHELL", "test -f /proc/1/status || exit 1"]
          interval: "30s"
          timeout: "5s"
          retries: 3
          start_period: "10s"

  # -----------------------------------------------------------------------
  # Named volumes (remove if your app has no persistent storage)
  # -----------------------------------------------------------------------
  # volumes_def:
  #   - "myapp_{{ deploy_env }}_uploads"
  # caddy_verify_path: "/health"

