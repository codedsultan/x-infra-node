---
# Which environment this inventory targets
deploy_env: staging   # override to "production" in production inventory

# Where app compose files + .env files live on the server
apps_base_dir: "/srv/apps"

# Caddy proxy
proxy_base_dir: "/srv/proxy"

caddy:
  container_name: "platform-caddy"

# Cluster Docker networks (pre-existing)
cluster_network: "cluster_{{ deploy_env }}_shared"

# Registry credentials (set in vault.yml)
vault_registries:
  ghcr:
    url: ghcr.io
    username: "{{ vault_ghcr_username }}"
    token: "{{ vault_ghcr_token }}"

env_file_path: "{{ apps_base_dir }}/app-{{ deploy_env }}/.env"
docker_network: "{{ cluster_network }}"