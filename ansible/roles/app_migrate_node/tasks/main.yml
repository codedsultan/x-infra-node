# roles/app_migrate_node/tasks/main.yml
---
- name: Pull latest image for migration
  community.docker.docker_image:
    name: "{{ app.image }}"
    source: pull
    force_source: true
  when: ansible_date_time is defined

- name: Run database migrations
  ansible.builtin.command:
    cmd: |
      docker run --rm \
        --env-file {{ env_file_path | required }} \
        --network {{ docker_network | default('caddy_network') }} \
        {{ app.image }} \
        {{ migrate_command }}
  register: migrate_result
  timeout: "{{ migrate_timeout | default(300) }}"
  changed_when: true

- name: Display migration output
  ansible.builtin.debug:
    msg: "{{ migrate_result.stdout_lines }}"

- name: Check migration output for errors
  ansible.builtin.fail:
    msg: "Migration failed. Check the migration output above for details."
  when: 
    - migrate_result.stdout is defined
    - "'failed' in migrate_result.stdout.lower() or 'error' in migrate_result.stdout.lower()"