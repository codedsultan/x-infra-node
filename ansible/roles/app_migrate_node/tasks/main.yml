# roles/app_migrate_node/tasks/main.yml
- name: Run database migrations
  community.docker.docker_container:
    name: "app-{{ deploy_env }}-migrate-{{ ansible_date_time.epoch | default(omit) }}"
    image: "{{ app.image }}"
    env_file: "{{ app_env_file | default('./.env') }}"
    command: "{{ migrate_command }}"
    network: "{{ docker_network | default('caddy_network') }}"
    detach: false
    cleanup: true
    state: started
  register: migrate_result
  timeout: "{{ migrate_timeout | default(300) }}"
  when: ansible_date_time is defined

- name: Run database migrations (fallback without timestamp)
  community.docker.docker_container:
    name: "app-{{ deploy_env }}-migrate"
    image: "{{ app.image }}"
    env_file: "{{ app_env_file | default('./.env') }}"
    command: "{{ migrate_command }}"
    network: "{{ docker_network | default('caddy_network') }}"
    detach: false
    cleanup: true
    state: started
  register: migrate_result
  timeout: "{{ migrate_timeout | default(300) }}"
  when: ansible_date_time is not defined