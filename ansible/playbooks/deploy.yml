---
# playbooks/deploy.yml
- name: Deploy Node.js App
  hosts: all
  gather_facts: false

  pre_tasks:
    - name: Run local preflight checks
      delegate_to: localhost
      connection: local
      run_once: true
      become: false
      ansible.builtin.command: ./scripts/preflight.sh
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Assert deploy_env is valid
      ansible.builtin.assert:
        that:
          - deploy_env in ["staging", "production"]
        fail_msg: "deploy_env must be 'staging' or 'production'"

    - name: Assert app is defined
      ansible.builtin.assert:
        that:
          - app is defined
          - app.image is defined
        fail_msg: "app config missing — check group_vars/all/app.yml"

  tasks:
    - name: Generate .env file
      ansible.builtin.include_role:
        name: app_env_node

    - name: Deploy app runtime
      ansible.builtin.include_role:
        name: app_runtime_node

    - name: Write Caddy route
      ansible.builtin.copy:
        dest: "{{ proxy_base_dir }}/apps/app-{{ deploy_env }}.caddy"
        mode: "0644"
        content: |
          {{ app.domains[deploy_env] | join(", ") }} {
            reverse_proxy app-{{ deploy_env }}-{{ app.public_service }}:{{ app.public_service_port }}
          }

    - name: Reload Caddy
      ansible.builtin.command: docker exec {{ caddy.container_name }} caddy reload --config /etc/caddy/Caddyfile
      changed_when: true


  # Consistent approach - both use existing container
    - name: Run migrations on running container
      community.docker.docker_container_exec:
        container: "app-{{ deploy_env }}-{{ app.public_service }}"
        # command: "node database/scripts/migrations/up.js"
        command: "npx tsx database/scripts/migrations/up.ts"

    - name: Run seeds on running container (staging only)
      community.docker.docker_container_exec:
        container: "app-{{ deploy_env }}-{{ app.public_service }}"
        # command: "node database/scripts/db/seed.js"
        command: "npx tsx database/scripts/db/seed.ts"
      when: deploy_env != 'production'

