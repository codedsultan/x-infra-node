# playbooks/deploy.yml
- name: Deploy Node.js App
  hosts: all
  gather_facts: false
  vars:
    tag: "{{ TAG | default('latest') }}"

  pre_tasks:
    - name: Gather facts (required for timestamps)
      ansible.builtin.setup:
      when: ansible_date_time is not defined

    - name: Run local preflight checks
      delegate_to: localhost
      connection: local
      run_once: true
      become: false
      ansible.builtin.command: ./scripts/preflight.sh
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Assert deploy_env is valid
      ansible.builtin.assert:
        that:
          - deploy_env in ["staging", "production"]
        fail_msg: "deploy_env must be 'staging' or 'production'"

    - name: Assert app is defined
      ansible.builtin.assert:
        that:
          - app is defined
          - app.image is defined
        fail_msg: "app config missing — check group_vars/all/app.yml"

    - name: Debug deployment info
      ansible.builtin.debug:
        msg:
          - "Environment: {{ deploy_env }}"
          - "Image Tag: {{ tag }}"
          - "Full Image: {{ app.image | replace('${TAG}', tag) }}"

  tasks:
    - name: Generate .env file
      ansible.builtin.include_role:
        name: app_env_node
      vars:
        tag: "{{ tag }}"

    - name: Set env file path
      ansible.builtin.set_fact:
        env_file_path: "{{ apps_base_dir }}/app-{{ deploy_env }}/.env"
        docker_network: "{{ cluster_network }}"

    - name: Verify env file exists
      ansible.builtin.stat:
        path: "{{ env_file_path }}"
      register: env_file_stat

    # ──────────────────────────────────────────────────────────────────────────
    # Database Migrations (Run before app deployment)
    # ──────────────────────────────────────────────────────────────────────────
    - name: Run database migrations
      ansible.builtin.command:
        cmd: |
          docker run --rm \
            --env-file {{ env_file_path }} \
            --network {{ docker_network }} \
            {{ app.image | replace('${TAG}', tag) }} \
            pnpm migrate:up
      register: migrate_result
      timeout: 300
      changed_when: true

    - name: Display migration output
      ansible.builtin.debug:
        msg: "{{ migrate_result.stdout_lines }}"

    - name: Check migration for errors
      ansible.builtin.fail:
        msg: "Migration failed. Check output above."
      when: 
        - migrate_result.stdout is defined
        - "'failed' in migrate_result.stdout.lower() or 'error' in migrate_result.stdout.lower()"

    # Optional: Seed database (staging only)
    - name: Seed database (staging only)
      when: deploy_env == "staging"
      ansible.builtin.command:
        cmd: |
          docker run --rm \
            --env-file {{ env_file_path }} \
            --network {{ docker_network }} \
            {{ app.image | replace('${TAG}', tag) }} \
            pnpm db:seed
      register: seed_result
      changed_when: true
      failed_when: false

    - name: Log seed result
      when: deploy_env == "staging" and seed_result.stdout is defined
      ansible.builtin.debug:
        msg: "{{ seed_result.stdout_lines }}"

    # ──────────────────────────────────────────────────────────────────────────
    # Deploy App Runtime
    # ──────────────────────────────────────────────────────────────────────────
    - name: Deploy app runtime
      ansible.builtin.include_role:
        name: app_runtime_node
      vars:
        tag: "{{ tag }}"

    - name: Write Caddy route
      ansible.builtin.copy:
        dest: "{{ proxy_base_dir }}/apps/app-{{ deploy_env }}.caddy"
        mode: "0644"
        content: |
          {{ app.domains[deploy_env] | join(", ") }} {
            reverse_proxy app-{{ deploy_env }}-{{ app.public_service }}:{{ app.public_service_port }}
          }

    - name: Reload Caddy
      ansible.builtin.command: docker exec {{ caddy.container_name }} caddy reload --config /etc/caddy/Caddyfile
      changed_when: true

    - name: Verify app is reachable
      ansible.builtin.uri:
        url: "https://{{ app.domains[deploy_env][0] }}{{ app.caddy_verify_path | default('/health') }}"
        method: GET
        return_content: false
        status_code: [200, 301, 302, 401, 403, 404]
        validate_certs: false
      register: health_check
      retries: 12
      delay: 5
      until: health_check.status in [200, 301, 302, 401, 403, 404]

    # ──────────────────────────────────────────────────────────────────────────
    # Post-deployment validation
    # ──────────────────────────────────────────────────────────────────────────
    - name: Verify database connectivity after deployment
      ansible.builtin.uri:
        url: "https://{{ app.domains[deploy_env][0] }}/health"
        method: GET
        return_content: true
        validate_certs: false
      register: health_response

    - name: Check database health status
      ansible.builtin.fail:
        msg: "Database health check failed"
      when: 
        - health_response.json is defined
        - health_response.json.database is defined
        - health_response.json.database | dict2items | selectattr('value', 'equalto', false) | list | length > 0

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ✅ Deployment complete!
          Environment: {{ deploy_env }}
          Image Tag: {{ tag }}
          Full Image: {{ app.image | replace('${TAG}', tag) }}
          Env file: {{ env_file_path }}
          API URL: https://{{ app.domains[deploy_env][0] }}
          Health Status: {{ health_response.status }}